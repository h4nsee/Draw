<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gartic Studio Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #111111; --panel-color: #1c1c1e; --text-color: #ffffff;
            --accent-color: #8e44ad; --danger-color: #ff453a; --border-color: #38383a; --canvas-bg: #ffffff;
        }
        body.light-theme {
            --bg-color: #f4f4f9; --panel-color: #ffffff; --text-color: #000000;
            --border-color: #d1d1d6; --canvas-bg: #ffffff;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none;
        }
        .top-bar {
            padding: 10px 16px; background-color: var(--panel-color); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }
        .task-text { font-size: 15px; font-weight: 600; }
        .timer-container { position: relative; width: 40px; height: 40px; }
        .timer-svg { transform: rotate(-90deg); width: 40px; height: 40px; }
        .timer-bg { fill: none; stroke: var(--border-color); stroke-width: 3; }
        .timer-progress { 
            fill: none; stroke: var(--accent-color); stroke-width: 3; stroke-linecap: round; 
            transition: stroke-dashoffset 1s linear; 
        }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: bold; }
        
        #canvas-wrapper { flex-grow: 1; position: relative; background: var(--canvas-bg); margin: 10px; border-radius: 16px; overflow: hidden; }
        canvas { display: block; touch-action: none; }
        
        .toolbar { background: var(--panel-color); padding: 15px; border-top: 1px solid var(--border-color); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .palette { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; flex-shrink: 0; }
        .color-dot.active { border-color: var(--text-color); transform: scale(1.1); }
        
        .size-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input[type=range] { flex-grow: 1; accent-color: var(--accent-color); }
        
        .actions-row { display: flex; gap: 10px; }
        .action-btn { flex: 1; height: 45px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #clear-btn { background: #333; color: var(--danger-color); }
        .btn-send { background: var(--accent-color); color: white; flex: 2; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="task-text" id="task-text">Загрузка...</div>
        <div class="timer-container">
            <svg class="timer-svg"><circle class="timer-bg" cx="20" cy="20" r="17"></circle><circle id="timer-progress" class="timer-progress" cx="20" cy="20" r="17"></circle></svg>
            <div id="timer-num" class="timer-text">--</div>
        </div>
    </div>

    <div id="canvas-wrapper"><canvas id="canvas"></canvas></div>

    <div class="toolbar">
        <div class="palette" id="palette"></div>
        <div class="size-row">
            <input type="range" id="size-slider" min="2" max="30" value="6">
        </div>
        <div class="actions-row">
            <button class="action-btn" id="clear-btn" onclick="clearCanvas()">Очистить</button>
            <button class="action-btn btn-send" id="send-btn" onclick="sendDrawing()">Готово</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const params = new URLSearchParams(window.location.search);
        
        let drawing = false;
        let currentColor = '#000000';
        let isSent = false;

        // Инициализация задачи и таймера
        document.getElementById('task-text').innerText = params.get('task') || "Рисуй!";
        startTimer(60);

        // Настройка канваса
        function setupCanvas() {
            const container = document.getElementById('canvas-wrapper');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        setupCanvas();

        // Палитра
        const colors = ['#000000', '#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#007aff', '#5856d6', '#8e44ad'];
        const palette = document.getElementById('palette');
        colors.forEach(c => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.background = c;
            if(c === currentColor) dot.classList.add('active');
            dot.onclick = () => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                currentColor = c;
            };
            palette.appendChild(dot);
        });

        // Рисование (Touch)
        canvas.addEventListener('touchstart', (e) => {
            drawing = true;
            ctx.beginPath();
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(t.clientX - rect.left, t.clientY - rect.top);
        });

        canvas.addEventListener('touchmove', (e) => {
            if(!drawing) return;
            e.preventDefault();
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = document.getElementById('size-slider').value;
            ctx.lineTo(t.clientX - rect.left, t.clientY - rect.top);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', () => { drawing = false; });

        function clearCanvas() { ctx.fillRect(0, 0, canvas.width, canvas.height); }

        function startTimer(seconds) {
            let timeLeft = seconds;
            const progress = document.getElementById('timer-progress');
            const circ = 2 * Math.PI * 17;
            progress.style.strokeDasharray = circ;
            
            const interval = setInterval(() => {
                document.getElementById('timer-num').innerText = timeLeft;
                progress.style.strokeDashoffset = ((seconds - timeLeft) / seconds) * circ;
                if (timeLeft <= 0) { clearInterval(interval); sendDrawing(); }
                timeLeft--;
            }, 1000);
        }

        function sendDrawing() {
            if (isSent) return;
            isSent = true;
            const btn = document.getElementById('send-btn');
            btn.innerText = "...";

            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'drawing.png');
                formData.append('user_id', tg.initDataUnsafe.user.id);
                formData.append('chat_id', params.get('chat_id'));

                // ОТПРАВКА НА ТВОЙ СЕРВЕР
                fetch('http://89.223.68.124:8080/upload', {
                    method: 'POST',
                    body: formData,
                    mode: 'cors'
                })
                .then(res => { if(res.ok) tg.close(); else alert("Ошибка!"); })
                .catch(err => { alert("Сеть!"); isSent = false; btn.innerText = "Готово"; });
            }, 'image/png');
        }
    </script>
</body>
</html>
