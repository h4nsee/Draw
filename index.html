<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gartic Studio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #111111; --panel-color: #1c1c1e; --text-color: #ffffff;
            --accent-color: #007aff; --danger-color: #ff453a; --border-color: #38383a;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Шапка с таймером */
        .top-bar {
            padding: 12px 16px; background-color: var(--panel-color); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }

        .task-wrapper { flex-grow: 1; margin-right: 15px; }
        .task-label { font-size: 11px; color: #8e8e93; text-transform: uppercase; margin-bottom: 2px; }
        .task-text { font-size: 16px; font-weight: 600; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Круговой таймер */
        .timer-container { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
        .timer-svg { transform: rotate(-90deg); width: 44px; height: 44px; }
        .timer-bg { fill: none; stroke: #333; stroke-width: 3; }
        .timer-progress { fill: none; stroke: var(--accent-color); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: bold; }

        #canvas-wrapper { flex-grow: 1; position: relative; background: white; margin: 10px; border-radius: 16px; overflow: hidden; }
        canvas { display: block; }

        .toolbar { background: var(--panel-color); padding: 15px; border-top: 1px solid var(--border-color); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .palette { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
        .color-dot { width: 34px; height: 34px; border-radius: 50%; border: 3px solid transparent; flex-shrink: 0; }
        .color-dot.active { border-color: white; transform: scale(1.1); }

        .size-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; color: #8e8e93; font-size: 13px; }
        input[type=range] { flex-grow: 1; -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { background: #333; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: white; border-radius: 50%; margin-top: -8px; }

        .actions-row { display: flex; gap: 10px; }
        button.action-btn { height: 48px; border-radius: 12px; border: none; font-weight: 600; display: flex; align-items: center; justify-content: center; }
        #clear-btn, #undo-btn { width: 50px; background: #2c2c2e; color: var(--accent-color); border: 1px solid var(--border-color); }
        #clear-btn { color: var(--danger-color); }
        .btn-send { flex-grow: 1; background: var(--accent-color); color: white; }
        .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="task-wrapper">
            <div class="task-label">Рисуй:</div>
            <div class="task-text" id="task-text">Задание загружается...</div>
        </div>
        <div class="timer-container">
            <svg class="timer-svg">
                <circle class="timer-bg" cx="22" cy="22" r="19"></circle>
                <circle id="timer-progress" class="timer-progress" cx="22" cy="22" r="19"></circle>
            </svg>
            <div id="timer-num" class="timer-text">--</div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="palette" id="palette"></div>
        <div class="size-row"><span>тонко</span><input type="range" id="size-slider" min="2" max="35" value="7"><span>толсто</span></div>
        <div class="actions-row">
            <button class="action-btn" id="clear-btn" onclick="clearCanvas()"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            <button class="action-btn" id="undo-btn" onclick="undo()"><svg class="icon" viewBox="0 0 24 24"><path d="M3 10h10a5 5 0 0 1 5 5 5 5 0 0 1-5 5H3m4-6-4-4 4-4"/></svg></button>
            <button class="action-btn btn-send" onclick="sendDrawing()">Готово</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false, history = [], currentColor = '#000000';

        // ТАЙМЕР
        let timeLeft = 60; // По умолчанию
        const timerCircle = document.getElementById('timer-progress');
        const timerNum = document.getElementById('timer-num');
        const circumference = 2 * Math.PI * 19;
        timerCircle.style.strokeDasharray = circumference;

        function startTimer(seconds) {
            timeLeft = seconds;
            let total = seconds;
            const update = () => {
                timerNum.innerText = timeLeft;
                let offset = circumference - (timeLeft / total) * circumference;
                timerCircle.style.strokeDashoffset = offset;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    sendDrawing(); // Авто-отправка
                }
                timeLeft--;
            };
            update();
            const interval = setInterval(update, 1000);
        }

        function init() {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('task-text').innerText = params.get('task') || "Твое задание";
            let timeParam = parseInt(params.get('time')) || 60;
            startTimer(timeParam);

            const container = document.getElementById('canvas-wrapper');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = container.clientWidth + 'px';
            canvas.style.height = container.clientHeight + 'px';
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            saveState();

            const colors = ['#000000', '#ffffff', '#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#007aff', '#5856d6', '#af52de'];
            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = c;
                if(c === currentColor) dot.classList.add('active');
                dot.onclick = () => {
                    document.querySelector('.color-dot.active').classList.remove('active');
                    dot.classList.add('active');
                    currentColor = c;
                    tg.HapticFeedback.selectionChanged();
                };
                document.getElementById('palette').appendChild(dot);
            });
        }

        function saveState() { if (history.length > 20) history.shift(); history.push(canvas.toDataURL()); }
        function undo() { if (history.length > 1) { history.pop(); let img = new Image(); img.src = history[history.length-1]; img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width/(window.devicePixelRatio||1),canvas.height/(window.devicePixelRatio||1)); }; tg.HapticFeedback.impactOccurred('light'); } }
        
        const getPos = (e) => { const rect = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - rect.left, y: t.clientY - rect.top }; };
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); let p = getPos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('touchmove', (e) => { if(!drawing) return; e.preventDefault(); let p = getPos(e); ctx.strokeStyle = currentColor; ctx.lineWidth = document.getElementById('size-slider').value; ctx.lineTo(p.x, p.y); ctx.stroke(); });
        canvas.addEventListener('touchend', () => { if(drawing) saveState(); drawing = false; });

        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); saveState(); tg.HapticFeedback.notificationOccurred('warning'); }
        function sendDrawing() { tg.sendData(canvas.toDataURL()); setTimeout(() => tg.close(), 100); }

        init();
    </script>
</body>
</html>
