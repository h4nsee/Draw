<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gartic Studio Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Темная тема (по умолчанию) */
            --bg-color: #111111; --panel-color: #1c1c1e; --text-color: #ffffff;
            --accent-color: #8e44ad; /* Фиолетовый акцент */
            --danger-color: #ff453a; --border-color: #38383a; --canvas-bg: #ffffff;
        }

        /* Светлая тема */
        body.light-theme {
            --bg-color: #f4f4f9; --panel-color: #ffffff; --text-color: #000000;
            --border-color: #d1d1d6; --canvas-bg: #ffffff;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; touch-action: none; transition: background 0.3s, color 0.3s;
        }

        /* Шапка */
        .top-bar {
            padding: 10px 16px; background-color: var(--panel-color); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; z-index: 10; transition: background 0.3s;
        }

        .task-wrapper { flex-grow: 1; margin-right: 10px; overflow: hidden; }
        .task-label { font-size: 10px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .task-text { font-size: 15px; font-weight: 600; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Блок управления сверху (Таймер + Тема) */
        .top-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

        /* Круговой таймер (Фиолетовый) */
        .timer-container { position: relative; width: 40px; height: 40px; }
        .timer-svg { transform: rotate(-90deg); width: 40px; height: 40px; }
        .timer-bg { fill: none; stroke: var(--border-color); stroke-width: 3; }
        .timer-progress { fill: none; stroke: var(--accent-color); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: bold; }

        /* Кнопка переключения темы */
        #theme-btn {
            width: 40px; height: 40px; background: none; border: 1px solid var(--border-color);
            border-radius: 50%; color: var(--text-color); display: flex; align-items: center; justify-content: center;
            cursor: pointer; padding: 0; transition: transform 0.1s;
        }
        #theme-btn:active { transform: scale(0.9); }
        .theme-icon { width: 20px; height: 20px; fill: currentColor; }

        /* Холст */
        #canvas-wrapper { flex-grow: 1; position: relative; background: var(--canvas-bg); margin: 10px; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        canvas { display: block; }

        /* Нижняя панель */
        .toolbar { background: var(--panel-color); padding: 15px; border-top: 1px solid var(--border-color); padding-bottom: calc(15px + env(safe-area-inset-bottom)); transition: background 0.3s; }
        
        /* Палитра (Компактная -20%) */
        .palette { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 2px; }
        .color-dot { width: 27px; height: 27px; border-radius: 50%; border: 2px solid transparent; flex-shrink: 0; transition: transform 0.1s; }
        .color-dot.active { border-color: var(--text-color); transform: scale(1.15); box-shadow: 0 0 8px rgba(255,255,255,0.2); }
        body.light-theme .color-dot.active { box-shadow: 0 0 8px rgba(0,0,0,0.1); }

        /* Ползунок толщины (Фиолетовый) */
        .size-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; color: #8e8e93; font-size: 13px; }
        input[type=range] { flex-grow: 1; -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { background: var(--border-color); height: 5px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #ffffff; border-radius: 50%; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 1px solid #d1d1d6; }
        body.light-theme input[type=range]::-webkit-slider-thumb { background: var(--accent-color); border: none; }

        /* Кнопки действий */
        .actions-row { display: flex; gap: 10px; }
        button.action-btn { height: 48px; border-radius: 12px; border: none; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; }
        button.action-btn:active { transform: scale(0.97); }

        #clear-btn, #undo-btn { width: 55px; background: var(--panel-color); color: var(--accent-color); border: 1px solid var(--border-color)!important; }
        #clear-btn { color: var(--danger-color); }
        
        /* Кнопка Готово (Фиолетовая) */
        .btn-send { flex-grow: 1; background: var(--accent-color); color: white; font-size: 16px; }

        .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="task-wrapper">
            <div class="task-label">Рисуй:</div>
            <div class="task-text" id="task-text">Загрузка...</div>
        </div>
        <div class="top-controls">
            <button id="theme-btn">
                <svg id="sun-icon" class="theme-icon" viewBox="0 0 24 24"><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"/></svg>
                <svg id="moon-icon" class="theme-icon" viewBox="0 0 24 24" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <div class="timer-container">
                <svg class="timer-svg">
                    <circle class="timer-bg" cx="20" cy="20" r="17"></circle>
                    <circle id="timer-progress" class="timer-progress" cx="20" cy="20" r="17"></circle>
                </svg>
                <div id="timer-num" class="timer-text">--</div>
            </div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="palette" id="palette"></div>
        <div class="size-row"><span>тонко</span><input type="range" id="size-slider" min="2" max="35" value="7"><span>толсто</span></div>
        <div class="actions-row">
            <button class="action-btn" id="clear-btn" onclick="clearCanvas()"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            <button class="action-btn" id="undo-btn" onclick="undo()"><svg class="icon" viewBox="0 0 24 24"><path d="M3 10h10a5 5 0 0 1 5 5 5 5 0 0 1-5 5H3m4-6-4-4 4-4"/></svg></button>
            <button class="action-btn btn-send" onclick="sendDrawing()">Готово</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false, history = [], currentColor = '#000000';

        // ТАЙМЕР
        let timeLeft = 60;
        const timerCircle = document.getElementById('timer-progress');
        const timerNum = document.getElementById('timer-num');
        const circumference = 2 * Math.PI * 17;
        timerCircle.style.strokeDasharray = circumference;

        function startTimer(seconds) {
            timeLeft = seconds;
            let total = seconds;
            const update = () => {
                timerNum.innerText = timeLeft;
                let offset = circumference - (timeLeft / total) * circumference;
                timerCircle.style.strokeDashoffset = offset;
                if (timeLeft <= 0) { clearInterval(interval); sendDrawing(); }
                timeLeft--;
            };
            update();
            const interval = setInterval(update, 1000);
        }

        // ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ
        const themeBtn = document.getElementById('theme-btn');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        themeBtn.onclick = () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            
            // Меняем иконку
            sunIcon.style.display = isLight ? 'none' : 'block';
            moonIcon.style.display = isLight ? 'block' : 'none';
            
            // Уведомляем Telegram о смене цвета шапки
            const panelColor = getComputedStyle(document.documentElement).getPropertyValue('--panel-color').trim();
            tg.setHeaderColor(panelColor);
            
            tg.HapticFeedback.impactOccurred('light');
        };

        function init() {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('task-text').innerText = params.get('task') || "Нарисуй что-нибудь улётное!";
            let timeParam = parseInt(params.get('time')) || 60;
            startTimer(timeParam);

            // Telegram Header Color (Dark by default)
            tg.setHeaderColor('#1c1c1e');

            const container = document.getElementById('canvas-wrapper');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = container.clientWidth + 'px';
            canvas.style.height = container.clientHeight + 'px';
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            saveState();

            const colors = ['#000000', '#ffffff', '#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#007aff', '#8e44ad', '#5856d6'];
            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = c;
                if(c === currentColor) dot.classList.add('active');
                if(c === '#ffffff') dot.style.border = '2px solid #3d3d41';
                dot.onclick = () => {
                    const active = document.querySelector('.color-dot.active');
                    if(active) active.classList.remove('active');
                    if(active && active.style.background === 'rgb(255, 255, 255)') active.style.border = '2px solid #3d3d41';
                    
                    dot.classList.add('active');
                    if(c === '#ffffff') dot.style.border = '2px solid transparent';
                    currentColor = c;
                    tg.HapticFeedback.selectionChanged();
                };
                document.getElementById('palette').appendChild(dot);
            });
        }

        function saveState() { if (history.length > 30) history.shift(); history.push(canvas.toDataURL()); }
        function undo() { if (history.length > 1) { history.pop(); let img = new Image(); img.src = history[history.length-1]; img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width/(window.devicePixelRatio||1),canvas.height/(window.devicePixelRatio||1)); }; tg.HapticFeedback.impactOccurred('light'); } }
        
        const getPos = (e) => { const rect = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - rect.left, y: t.clientY - rect.top }; };
        canvas.addEventListener('touchstart', (e) => { if(e.target.closest('.toolbar, .top-bar')) return; drawing = true; ctx.beginPath(); let p = getPos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('touchmove', (e) => { if(!drawing) return; let p = getPos(e); ctx.strokeStyle = currentColor; ctx.lineWidth = document.getElementById('size-slider').value; ctx.lineTo(p.x, p.y); ctx.stroke(); });
        canvas.addEventListener('touchend', () => { if(drawing) saveState(); drawing = false; });

        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); saveState(); tg.HapticFeedback.notificationOccurred('warning'); }
        function sendDrawing() { tg.sendData(canvas.toDataURL()); setTimeout(() => tg.close(), 100); }

        init();
    </script>
</body>
</html>
