<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartic Draw</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; color: white; }
        .header { padding: 10px; text-align: center; font-size: 14px; background: #2a2a2a; border-bottom: 1px solid #444; }
        canvas { background: #ffffff; flex-grow: 1; touch-action: none; }
        .controls { padding: 15px; display: flex; gap: 10px; background: #2a2a2a; }
        button { padding: 12px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; flex: 1; transition: 0.2s; }
        .btn-clear { background: #444; color: white; }
        .btn-send { background: #0088cc; color: white; }
        button:active { opacity: 0.7; transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header" id="task-text">Загрузка...</div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button class="btn-clear" onclick="clearCanvas()">Стереть</button>
        <button class="btn-send" onclick="sendDrawing()">Готово!</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const taskText = document.getElementById('task-text');
        let drawing = false;

        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Получаем задание из параметров (если будет передано)
        const urlParams = new URLSearchParams(window.location.search);
        taskText.innerText = urlParams.get('task') || "Нарисуй что-нибудь!";

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 130; // Учитываем хедер и кнопки
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
        }
        window.onresize = resize;
        resize();

        function start(e) { drawing = true; draw(e); }
        function end() { drawing = false; ctx.beginPath(); }
        function draw(e) {
            if (!drawing) return;
            const t = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(t.clientX - rect.left, t.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(t.clientX - rect.left, t.clientY - rect.top);
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', draw);
        window.addEventListener('touchend', end);

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function sendDrawing() {
            const dataUrl = canvas.toDataURL('image/png');
            // Отправляем данные в бота
            tg.sendData(dataUrl);
            tg.close(); // Закрываем окно
        }
    </script>
</body>
</html>
