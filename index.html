<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gartic Drawing</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Блокируем свайпы и скролл, чтобы приложение не закрывалось */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            /* Самая важная магия против сворачивания: */
            touch-action: none; 
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 10px;
        }

        #header {
            text-align: center;
            padding: 5px;
        }

        #timer {
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
        }

        #task {
            font-size: 18px;
            color: #bd93f9;
        }

        /* Твой холст */
        canvas {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            touch-action: none; /* Блокируем жесты на самом холсте */
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #clear-btn { background-color: #ff5555; color: white; }
        #send-btn { background-color: #50fa7b; color: #282a36; }
    </style>
</head>
<body>

<div id="container">
    <div id="header">
        <div id="timer">Осталось: <span id="time">--</span> сек</div>
        <div id="task">Задание: <span id="task-name">Загрузка...</span></div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="clear-btn" class="btn">Очистить</button>
        <button id="send-btn" class="btn">Готово!</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    
    // 1. Сразу разворачиваем на весь экран
    tg.expand();
    // 2. Включаем подтверждение закрытия (чтобы не вылететь случайно)
    tg.enableClosingConfirmation();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const timeDisplay = document.getElementById('time');
    const taskDisplay = document.getElementById('task-name');

    // Настройка размеров холста под экран
    canvas.width = window.innerWidth * 0.9;
    canvas.height = window.innerHeight * 0.6;

    // Читаем параметры из ссылки (время и задание)
    const urlParams = new URLSearchParams(window.location.search);
    let timeLeft = parseInt(urlParams.get('time')) || 60;
    taskDisplay.innerText = urlParams.get('task') || "Что-то интересное";

    // Таймер
    const timerInterval = setInterval(() => {
        timeLeft--;
        timeDisplay.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            sendDrawing(); // Автоотправка по истечении времени
        }
    }, 1000);

    // Логика рисования (адаптирована под тач)
    let drawing = false;

    function startDraw(e) {
        drawing = true;
        draw(e);
    }

    function stopDraw() {
        drawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!drawing) return;
        
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000';

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
    canvas.addEventListener('touchend', stopDraw);

    // Очистка
    document.getElementById('clear-btn').onclick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    // Отправка рисунка боту
    function sendDrawing() {
        const dataURL = canvas.toDataURL('image/png');
        tg.sendData(dataURL); // Отправляем данные в бот
        tg.close(); // Закрываем приложение
    }

    document.getElementById('send-btn').onclick = sendDrawing;

    // Сообщаем боту, что приложение готово
    tg.ready();
</script>

</body>
</html>
