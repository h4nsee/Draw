<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gartic Studio Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #111111; --panel-color: #1c1c1e; --text-color: #ffffff;
            --accent-color: #8e44ad; --danger-color: #ff453a; --border-color: #38383a; --canvas-bg: #ffffff;
        }
        body.light-theme {
            --bg-color: #f4f4f9; --panel-color: #ffffff; --text-color: #000000;
            --border-color: #d1d1d6; --canvas-bg: #ffffff;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none;
            transition: background 0.3s, color 0.3s;
        }
        .top-bar {
            padding: 10px 16px; background-color: var(--panel-color); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }
        .task-wrapper { flex-grow: 1; margin-right: 10px; overflow: hidden; }
        .task-label { font-size: 10px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .task-text { font-size: 15px; font-weight: 600; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .top-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .timer-container { position: relative; width: 40px; height: 40px; }
        .timer-svg { transform: rotate(-90deg); width: 40px; height: 40px; }
        .timer-bg { fill: none; stroke: var(--border-color); stroke-width: 3; }
        .timer-progress { fill: none; stroke: var(--accent-color); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: bold; }
        #theme-btn { width: 40px; height: 40px; background: none; border: 1px solid var(--border-color); border-radius: 50%; color: var(--text-color); display: flex; align-items: center; justify-content: center; }
        .theme-icon { width: 20px; height: 20px; fill: currentColor; }
        #canvas-wrapper { flex-grow: 1; position: relative; background: var(--canvas-bg); margin: 10px; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        canvas { display: block; touch-action: none; transform-origin: center; transition: transform 0.1s ease-out; }
        .toolbar { background: var(--panel-color); padding: 15px; border-top: 1px solid var(--border-color); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .palette { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
        .palette::-webkit-scrollbar { display: none; }
        .color-dot { width: 27px; height: 27px; border-radius: 50%; border: 2px solid transparent; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
        .color-dot.active { border-color: var(--text-color); transform: scale(1.15); }
        .size-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; color: #8e8e93; font-size: 13px; }
        input[type=range] { flex-grow: 1; -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { background: var(--border-color); height: 5px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--accent-color); border-radius: 50%; margin-top: -8px; }
        .actions-row { display: flex; gap: 10px; }
        button.action-btn { height: 48px; border-radius: 12px; border: none; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.2s; }
        #clear-btn, #undo-btn { width: 55px; background: var(--panel-color); color: var(--accent-color); border: 1px solid var(--border-color)!important; }
        #clear-btn { color: var(--danger-color); }
        .btn-send { flex-grow: 1; background: var(--accent-color); color: white; font-size: 16px; }
        .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="task-wrapper">
            <div class="task-label">Рисуй:</div>
            <div class="task-text" id="task-text">Загрузка...</div>
        </div>
        <div class="top-controls">
            <button id="theme-btn">
                <svg id="sun-icon" class="theme-icon" viewBox="0 0 24 24"><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"/></svg>
                <svg id="moon-icon" class="theme-icon" viewBox="0 0 24 24" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <div class="timer-container">
                <svg class="timer-svg"><circle class="timer-bg" cx="20" cy="20" r="17"></circle><circle id="timer-progress" class="timer-progress" cx="20" cy="20" r="17"></circle></svg>
                <div id="timer-num" class="timer-text">--</div>
            </div>
        </div>
    </div>

    <div id="canvas-wrapper"><canvas id="canvas"></canvas></div>

    <div class="toolbar">
        <div class="palette" id="palette"></div>
        <div class="size-row"><span>тонко</span><input type="range" id="size-slider" min="2" max="35" value="7"><span>толсто</span></div>
        <div class="actions-row">
            <button class="action-btn" id="clear-btn" onclick="clearCanvas()"><svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
            <button class="action-btn" id="undo-btn" onclick="undo()"><svg class="icon" viewBox="0 0 24 24"><path d="M3 10h10a5 5 0 0 1 5 5 5 5 0 0 1-5 5H3m4-6-4-4 4-4"/></svg></button>
            <button class="action-btn btn-send" id="send-btn" onclick="sendDrawing()">Готово</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.enableClosingConfirmation();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const params = new URLSearchParams(window.location.search);
        let drawing = false, history = [], currentColor = '#000000', isSent = false, timerInterval;

        // Переменные для зума
        let currentScale = 1;
        let translateX = 0, translateY = 0;
        let initialPinchDistance = null;
        let initialPinchCenter = null;
        let lastTranslateX = 0, lastTranslateY = 0;

        function applyTheme(theme) {
            const sun = document.getElementById('sun-icon');
            const moon = document.getElementById('moon-icon');
            if (theme === 'light') {
                document.body.classList.add('light-theme');
                sun.style.display = 'none'; moon.style.display = 'block';
                tg.setHeaderColor('#ffffff');
            } else {
                document.body.classList.remove('light-theme');
                sun.style.display = 'block'; moon.style.display = 'none';
                tg.setHeaderColor('#1c1c1e');
            }
        }
        
        document.getElementById('theme-btn').onclick = () => {
            const newTheme = document.body.classList.contains('light-theme') ? 'dark' : 'light';
            applyTheme(newTheme);
            localStorage.setItem('user_theme', newTheme);
        };

        function startTimer(seconds) {
            let timeLeft = seconds;
            const progress = document.getElementById('timer-progress');
            const circ = 2 * Math.PI * 17;
            progress.style.strokeDasharray = circ;
            timerInterval = setInterval(() => {
                document.getElementById('timer-num').innerText = timeLeft;
                progress.style.strokeDashoffset = ((seconds - timeLeft + 1) / seconds) * circ;
                if (timeLeft <= 0) { clearInterval(timerInterval); sendDrawing(); }
                timeLeft--;
            }, 1000);
        }

        function init() {
            document.getElementById('task-text').innerText = params.get('task') || "Рисуй!";
            startTimer(parseInt(params.get('time')) || 60);
            applyTheme(localStorage.getItem('user_theme') || tg.colorScheme);

            const container = document.getElementById('canvas-wrapper');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr; canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = container.clientWidth + 'px';
            canvas.style.height = container.clientHeight + 'px';
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
            
            const colors = [
                '#000000', '#7f7f7f', '#8B4513', '#ff3b30', '#FF69B4', '#ff9500', 
                '#ffcc00', '#34c759', '#006400', '#008080', '#007aff', '#00008B', 
                '#5856d6', '#8e44ad', '#c8a2c8', '#ffffff'
            ];
            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot'; dot.style.background = c;
                if(c === currentColor) dot.classList.add('active');
                dot.onclick = () => {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active'); currentColor = c;
                };
                document.getElementById('palette').appendChild(dot);
            });
        }

        function saveState() { if (history.length > 20) history.shift(); history.push(canvas.toDataURL()); }
        function undo() { 
            if (history.length > 1) { 
                history.pop();
                let img = new Image(); img.src = history[history.length-1];
                img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width/(window.devicePixelRatio||1),canvas.height/(window.devicePixelRatio||1)); };
            } 
        }

        const getPos = (e) => { 
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e; 
            const dpr = window.devicePixelRatio || 1;
            const scaleX = canvas.width / (rect.width * dpr);
            const scaleY = canvas.height / (rect.height * dpr);
            return { 
                x: (t.clientX - rect.left) * scaleX, 
                y: (t.clientY - rect.top) * scaleY 
            }; 
        };
        
        canvas.addEventListener('touchstart', (e) => { 
            if(e.target.closest('.toolbar, .top-bar')) return;
            e.preventDefault(); 

            if (e.touches.length === 2) {
                drawing = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialPinchCenter = {
                    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
                };
                lastTranslateX = translateX;
                lastTranslateY = translateY;
                return;
            }

            if (e.touches.length === 1) {
                drawing = true; ctx.beginPath(); 
                let p = getPos(e); ctx.moveTo(p.x, p.y); 
            }
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 

            if (e.touches.length === 2 && initialPinchDistance) {
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const currentCenter = {
                    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
                };

                const deltaScale = currentDistance / initialPinchDistance;
                let newScale = Math.max(1, Math.min(currentScale * deltaScale, 5));

                translateX = lastTranslateX + (currentCenter.x - initialPinchCenter.x);
                translateY = lastTranslateY + (currentCenter.y - initialPinchCenter.y);

                if (newScale === 1) { translateX = 0; translateY = 0; }

                canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${newScale})`;

                initialPinchDistance = currentDistance;
                initialPinchCenter = currentCenter;
                currentScale = newScale;
                lastTranslateX = translateX;
                lastTranslateY = translateY;
                return;
            }

            if(drawing && e.touches.length === 1) { 
                let p = getPos(e); ctx.strokeStyle = currentColor; ctx.lineWidth = document.getElementById('size-slider').value; 
                ctx.lineTo(p.x, p.y); ctx.stroke(); 
            }
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => { 
            if (e.touches.length < 2) {
                initialPinchDistance = null;
                initialPinchCenter = null;
            }
            if(drawing && e.touches.length === 0) { saveState(); drawing = false; }
        });

        function clearCanvas() { ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,canvas.width,canvas.height); saveState(); }

        function autoSend() {
            if (isSent) return;
            isSent = true;
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'drawing.png');
                const userIdFromUrl = params.get('user_id');
                const userIdFromTg = tg.initDataUnsafe.user?.id;
                formData.append('user_id', userIdFromUrl || userIdFromTg || "unknown");
                formData.append('chat_id', params.get('chat_id'));
                fetch('https://gartickrizis.ru/upload', {
                    method: 'POST',
                    body: formData,
                    mode: 'cors',
                    keepalive: true 
                }).catch(e => console.log("Фоновая отправка завершена:", e));
            }, 'image/png');
        }

        window.addEventListener('beforeunload', autoSend);
        window.addEventListener('pagehide', autoSend);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') autoSend();
        });

        function sendDrawing() {
            if (isSent) return;
            isSent = true;
            clearInterval(timerInterval);
            const sendBtn = document.getElementById('send-btn');
            sendBtn.innerHTML = '<div class="spinner"></div>';
            sendBtn.disabled = true;
            sendBtn.style.opacity = '0.7';
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'drawing.png');
                const userIdFromUrl = params.get('user_id');
                const userIdFromTg = tg.initDataUnsafe.user?.id;
                formData.append('user_id', userIdFromUrl || userIdFromTg || "unknown");
                formData.append('chat_id', params.get('chat_id'));
                fetch('https://gartickrizis.ru/upload', {
                    method: 'POST',
                    body: formData,
                    mode: 'cors'
                })
                .then(res => { 
                    if(res.ok) { tg.close(); } else { throw new Error("Ошибка сервера: " + res.status); }
                })
                .catch(err => {
                    alert("Ошибка отправки! Убедись, что бот запущен на сервере.");
                    isSent = false;
                    sendBtn.innerText = "Готово";
                    sendBtn.disabled = false;
                    sendBtn.style.opacity = '1';
                });
            }, 'image/png');
        }
        init();
    </script>
</body>
</html>
