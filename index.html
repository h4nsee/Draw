<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gartic Studio Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #111111; --panel-color: #1c1c1e; --text-color: #ffffff;
            --accent-color: #8e44ad; --danger-color: #ff453a; --border-color: #38383a; --canvas-bg: #ffffff;
        }

        body.light-theme {
            --bg-color: #f4f4f9; --panel-color: #ffffff; --text-color: #000000;
            --border-color: #d1d1d6; --canvas-bg: #ffffff;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden; 
            /* Критично для блокировки сворачивания: */
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }

        .top-bar {
            padding: 10px 16px; background-color: var(--panel-color); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }

        .task-wrapper { flex-grow: 1; margin-right: 10px; overflow: hidden; }
        .task-label { font-size: 10px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
        .task-text { font-size: 15px; font-weight: 600; line-height: 1.2; }

        .top-controls { display: flex; align-items: center; gap: 10px; }

        .timer-container { position: relative; width: 40px; height: 40px; }
        .timer-svg { transform: rotate(-90deg); width: 40px; height: 40px; }
        .timer-bg { fill: none; stroke: var(--border-color); stroke-width: 3; }
        .timer-progress { fill: none; stroke: var(--accent-color); stroke-width: 3; stroke-linecap: round; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: bold; }

        #theme-btn {
            width: 40px; height: 40px; background: none; border: 1px solid var(--border-color);
            border-radius: 50%; color: var(--text-color); display: flex; align-items: center; justify-content: center;
        }

        #canvas-wrapper { 
            flex-grow: 1; position: relative; background: var(--canvas-bg); 
            margin: 10px; border-radius: 16px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            touch-action: none; /* Блокируем жесты на контейнере */
        }
        canvas { display: block; touch-action: none; }

        .toolbar { 
            background: var(--panel-color); padding: 15px; 
            border-top: 1px solid var(--border-color); 
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
        }
        
        .palette { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; flex-shrink: 0; }
        .color-dot.active { border-color: var(--accent-color); transform: scale(1.1); }

        .size-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; color: #8e8e93; font-size: 13px; }
        input[type=range] { flex-grow: 1; height: 5px; }

        .actions-row { display: flex; gap: 10px; }
        button.action-btn { height: 48px; border-radius: 12px; border: none; font-weight: 600; display: flex; align-items: center; justify-content: center; }
        .btn-send { flex-grow: 1; background: var(--accent-color); color: white; }

        .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="task-wrapper">
            <div class="task-label">Рисуй:</div>
            <div id="task-text" class="task-text">Загрузка...</div>
        </div>
        <div class="top-controls">
            <button id="theme-btn">
                <svg id="sun-icon" style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24"><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"/></svg>
            </button>
            <div class="timer-container">
                <svg class="timer-svg"><circle class="timer-bg" cx="20" cy="20" r="17"></circle><circle id="timer-progress" class="timer-progress" cx="20" cy="20" r="17"></circle></svg>
                <div id="timer-num" class="timer-text">--</div>
            </div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="palette" id="palette"></div>
        <div class="size-row"><span>тонко</span><input type="range" id="size-slider" min="2" max="35" value="7"><span>толсто</span></div>
        <div class="actions-row">
            <button class="action-btn" id="clear-btn" style="width:55px; color:var(--danger-color); border:1px solid var(--border-color); background:none;" onclick="clearCanvas()">🗑</button>
            <button class="action-btn" id="undo-btn" style="width:55px; color:var(--accent-color); border:1px solid var(--border-color); background:none;" onclick="undo()">↩</button>
            <button class="action-btn btn-send" onclick="sendDrawing()">Готово</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.ready();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false, history = [], currentColor = '#000000';
        const dpr = window.devicePixelRatio || 1;

        // ИНИЦИАЛИЗАЦИЯ
        function init() {
            const container = document.getElementById('canvas-wrapper');
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            canvas.style.width = container.clientWidth + 'px';
            canvas.style.height = container.clientHeight + 'px';
            ctx.scale(dpr, dpr);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            saveState();

            const params = new URLSearchParams(window.location.search);
            document.getElementById('task-text').innerText = params.get('task') || "Шедевр";
            startTimer(parseInt(params.get('time')) || 60);

            // Палитра
            const colors = ['#000000', '#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#007aff', '#5856d6', '#8e44ad', '#ffffff'];
            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot' + (c === currentColor ? ' active' : '');
                dot.style.background = c;
                dot.onclick = () => {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    currentColor = c;
                };
                document.getElementById('palette').appendChild(dot);
            });
        }

        // РИСОВАНИЕ (с фиксацией жестов)
        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - rect.left, y: t.clientY - rect.top };
        };

        const start = (e) => {
            if (e.touches) e.preventDefault(); // Блокируем свайп Telegram
            drawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        };

        const move = (e) => {
            if (!drawing) return;
            if (e.touches) e.preventDefault();
            const p = getPos(e);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = document.getElementById('size-slider').value;
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        };

        const stop = () => { if(drawing) { saveState(); drawing = false; } };

        canvas.addEventListener('touchstart', start, {passive: false});
        canvas.addEventListener('touchmove', move, {passive: false});
        canvas.addEventListener('touchend', stop);
        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        // ТАЙМЕР
        function startTimer(seconds) {
            let timeLeft = seconds;
            const progress = document.getElementById('timer-progress');
            const num = document.getElementById('timer-num');
            const circ = 2 * Math.PI * 17;
            progress.style.strokeDasharray = circ;

            const interval = setInterval(() => {
                num.innerText = timeLeft;
                progress.style.strokeDashoffset = circ - (timeLeft / seconds) * circ;
                if (timeLeft <= 0) { clearInterval(interval); sendDrawing(); }
                timeLeft--;
            }, 1000);
        }

        function saveState() { if (history.length > 20) history.shift(); history.push(canvas.toDataURL()); }
        function undo() { if (history.length > 1) { history.pop(); let img = new Image(); img.src = history[history.length-1]; img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width/dpr,canvas.height/dpr); }; } }
        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); saveState(); }
        function sendDrawing() { tg.sendData(canvas.toDataURL()); tg.close(); }

        window.onload = init;
    </script>
</body>
</html>
